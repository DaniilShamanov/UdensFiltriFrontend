version: "3.9"

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: udens-filtri-fe:latest
    container_name: udens-filtri-fe
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
